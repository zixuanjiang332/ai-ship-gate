name: ReleaseGuard Self Test

on:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: releaseguard
        uses: zixuanjiang332/releaseguard-ai@v0.4.0
        with:
          base: origin/main
          ai: false
          pr-comment: always
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Echo verdict
        if: always()
        run: |
          echo "verdict=${{ steps.releaseguard.outputs.verdict }}"
          echo "findings=${{ steps.releaseguard.outputs.findings-count }}"
