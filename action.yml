name: ReleaseGuard AI
description: Deterministic PR diff release gate for AI-generated code.
inputs:
  base:
    description: Base ref to compare against.
    required: false
    default: origin/main
  ai:
    description: Enable optional AI explanation.
    required: false
    default: "false"
  pr-comment:
    description: "Optional pull request comment mode: off, on-failure, or always."
    required: false
    default: "off"
outputs:
  verdict:
    description: Final ReleaseGuard verdict, one of pass, warn, or fail.
  findings-count:
    description: Total number of findings in the checked diff.
  fail-count:
    description: Number of fail-severity findings in the checked diff.
  warn-count:
    description: Number of warn-severity findings in the checked diff.
runs:
  using: node20
  main: dist/action.js
